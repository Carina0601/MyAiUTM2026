<!DOCTYPE html>
<html>
<head>
    <title>Manual Speech History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        #history {
            margin-top: 20px;
            text-align: left;
            max-width: 500px;
            margin: 20px auto;
            border-left: 3px solid #28a745;
            padding-left: 15px;
        }
        .speech-entry {
            background: #f8f9fa;
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 6px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
        }
        #status { font-weight: bold; color: #d9534f; }
    </style>
</head>
<body>
    <h1>Manual Speech to Text</h1>
    <p>Click Start, speak as long as you want, then click Stop.</p>
    
    <button onclick="start()" id="startBtn">Start Recording</button>
    <button onclick="stop()" id="stopBtn" disabled>Stop Recording</button>
    
    <p id="status">Status: Idle</p>
    
    <h3>History:</h3>
    <div id="history"></div>

    <script>
        function start() {
            document.getElementById('status').innerText = "Status: RECORDING... (Speak now)";
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            fetch('/start', {method: 'POST'});
        }

        async function stop() {
            document.getElementById('status').innerText = "Status: Processing your voice...";
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;

            let response = await fetch('/stop', {method: 'POST'});
            let data = await response.json();
            
            if (data.text) {
                const historyDiv = document.getElementById('history');
                const newEntry = document.createElement('div');
                newEntry.className = 'speech-entry';
                newEntry.innerText = data.text;
                historyDiv.prepend(newEntry);
            }
            
            document.getElementById('status').innerText = "Status: Done. Ready for next recording.";
        }
    </script>
</body>
</html>
